[env]
term="xterm-256color"

[colors]
draw_bold_text_with_bright_colors = true

[cursor.style]
blinking = "Always"
shape = "Block"

[font.normal]
family = "JetBrainsMono Nerd Font"

[font]
builtin_box_drawing = true
size = 22

[font.offset]
x = 1
y = 1

[scrolling]
history = 100000
multiplier = 4

[keyboard]
bindings = [
{ key = "N", mods = "Control|Shift", action = "CreateNewWindow" },
{ key = "L", mods = "Control|Shift", chars = "l" },
{ key = "Return", mods = "Shift", chars = "\n"},
]

[window]
option_as_alt = "Both"

[window.dimensions]
columns = 120
lines = 30
